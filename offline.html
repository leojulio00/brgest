<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">
  
  <link rel="shortcut icon" href="assets/img/BR Gest favicon 01.png" type="image/x-icon">

  <title>Página Offline</title>

  <style>
    body {
        background-color: #f1f1f1;
    }

    .card {
        margin-top: 100px;
        border: none;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }

    .card-header {
        border-radius: 10px;
    }

    .card-body {
        font-size: 1.2rem;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center mt-5">
      <div class="col-md-8 col-lg-6">
        <div class="card text-center">
          <div class="card-header text-white" style="background-color: #423DCC;">
            <h3>Página Offline</h3>
          </div>
          <div class="card-body">
            <p>Você está offline no momento. Verifique sua conexão com a Internet e tente novamente mais tarde.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    if (!navigator.onLine) {
        const offlineCard = document.querySelector('.card');
        offlineCard.classList.remove('bg-danger');
        offlineCard.classList.add('bg-secondary');
    }

  </script>
</body>
</html>
